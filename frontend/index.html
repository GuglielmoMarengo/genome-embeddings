<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07111f" />
    <meta
      name="description"
      content="Interpretable multiscale genome embeddings and k-mer distribution analysis."
    />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect rx=%2224%22 width=%22100%22 height=%22100%22 fill=%22%230ea5e9%22/><path d=%22M28 18c28 18 16 46 44 64M72 18C44 36 56 64 28 82M35 30h30M31 46h38M31 62h38M35 78h30%22 stroke=%22white%22 stroke-width=%226%22 fill=%22none%22 stroke-linecap=%22round%22/></svg>" />
    <title>Genome Embeddings</title>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('genome-embeddings-theme');
          const dark = stored
            ? stored === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', dark);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
